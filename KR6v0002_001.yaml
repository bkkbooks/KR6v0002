body:
  text: 禪門之法如經論所說乃有多義非直一名一名禪定門亦名制心門亦名照心門亦名覺心門亦名察心門亦名正心門亦名知心門亦名了心門亦名達心門亦名徵心門亦名息心門亦名定心門亦名悟心門亦名住心門亦名安心門何名安心門者由常看守心故熟看諸境種種相貌一切境界悉知不從外來迷是自心變作知境界唯是自心作此觀自然漸合唯識觀智唯識者遮詮為義遮卻雜染虛妄之法詮取真如佛性者不去不來不生不滅不取不捨不垢不淨無為無染無有自性清淨湛然常名唯識觀智故言亦名安心門此出唯識論又言住心門者由常看守心故心即不起無動故心即安住維摩經云心常安住無礙解脫故言住心門言悟心門者由久看心不起動即自心體即與道合心虛空寂無礙為道故言悟心門言定心門者由常看守心故於五欲境界不亂不惑由看心故中不令亂故維摩經云念定總持辯才不斷故云亦名定心門言息心門者由常看守心故息妄緣念歸真寂定故云亦名息心門言徵心門者由常看守心故即見心中心心數法舉緣妄想卻徵緣心虛妄不可得故故云亦名徵心門言達心門者由常看守心故漸達自心本性清淨不為一切煩惱諸垢之所染污猶如虛空故云亦名達心門言了心門者由常看守心故了自己心無障無礙靈通迅速而體常住不動畢竟寂滅即涅槃相故云亦名了心門言知心門者由常看守心故知心去來知心生時知心滅時知過去心已滅不可得未來心未至不可得現在心不住不可得由常看守心故知心去來生滅悉常善故云知心門言正心門者由常看守心故不令妄念輒生正念不移故云亦名正心門言察心門者由常看守心故察煩惱賊六根之中六個頭首大賊六賊者眼愛美色耳貪好聲鼻貪好香舌貪美味身貪滑細意貪六塵六塵者色聲香味觸法也若貪著生愛即為所燒故智者察六塵賊不令得入譬如關令守門端坐專察門中有人來去悉須察慮不得一人輒盜來去察心亦爾所云察者即是覺察之義覺察心口善惡等念悉無遺漏若有善念即隨生滅若有惡念急手覺察挫制斷除常自覺察身心過失故云察心門言覺心門者由常看守心故即覺自心體性真如無色無形非常非斷非外非內亦非中間離諸色相不出不沒不來不去不生不滅不垢不淨亦非方圓大小長短離有離無畢竟空寂此是自家真如心本性清淨心不可以言說分別顯示維摩經云如自觀身實相觀佛亦然心亦前際不來後際不去今則不住與佛同體與法相應自體無為即合僧義即是僧寶動成物執即為法義即是法寶常覺即為佛義即是佛寶照見心中三寶復覺道在身中若心內覓不久見佛若著相外求累劫施功去道轉遠華嚴經云自歸依佛自歸依法僧此是心中一體三寶維摩經云若自觀者名為正觀若他觀者名為邪觀正觀者謂自觀身心得禪定解脫道故名正觀邪觀者謂身心之外妄取境界或見諸佛菩薩青黃赤白光明等事並是想心妄見與道相違故名邪觀又言覺心者是覺悟之心即是真佛即是菩提無量壽觀經云是心是佛是心作佛念佛三昧經云念佛祇是念心求心即是求佛所以者何心識無形佛無相貌維摩經云煩惱即是菩提謂覺煩惱性空無有處所名為菩提故名覺心門亦名照心門者慧日明朗照自心源不以日月所照為明觀世音經云慧日破諸闇故名照心門言制心門者心為身之主成敗之事皆由自心造惡並是心作善則天堂所攝惡則地獄所收不離生死大士發心善惡俱斷降伏自心入無生正觀遺教經云制心一處無事不辨故云亦名制心門言禪定解脫心門者禪定能絕念定即無思心無思念體性明淨離諸結縛名為解脫法華經云禪定解脫等不可思議法故云禪定解脫心門此大聖無相禪觀門並是往古大德禪師所作一依經論修學非是今時謬說問曰禪有大小以不答曰禪觀門有數種一大乘觀門二小乘觀門小乘聲聞觀法即數息安般安般即有次第第一禪第二禪第三禪第四禪即有所求即有所見即有所得得生人天得生非想非非想天受快樂報盡還墮三塗即聲聞觀法若依大乘觀法無求無慾無言無說寂然無相不生不滅不來不去無漏無為湛然常住若依菩薩五門觀法行時定住時定坐時定臥時定偃息時定著衣時定喫食時定語笑時定一切時中無有間念若依小乘觀法身心俱動即有出定即有入定若依菩薩觀法無有出入湛然一相無有變異身雖動作心常不動維摩經云心常安住無礙解脫人身喻如何物喻如車輪人有十八識車有十八輻輪行千里轉車軸恒如故鉤心常不動若無鉤心車即破壞不能運載頭陀經云五陰以為車無相以為牛調御以為心運載諸群生趣向般若洲人亦如是亦如十八識車輪者人身也車有十八輻人有十八識車鉤心者佛法也車軸人心也內有六根外有六塵中間有六識六根者眼耳鼻舌身意名為六根六塵者色聲香味觸法名為六塵六識者眼識耳識鼻識舌識身識意識名為六識六根六識六塵各六共為十八亦名十八界雖行住坐臥舉動施為心王常不動心王若動即流浪生死不能運載法之財寶維摩經云不著世間如蓮花常善入於空寂行達諸法相無罣礙稽首如空無所依蓮花雖在淤泥中生不被泥之所污染行人雖在五欲煩惱泥中坐不被煩惱所染偈贊云如蓮花不著水心清淨超於彼彼者彼岸浮囊者心守城者不令賊入賊者六根是也守護心不令賊入錄文完
