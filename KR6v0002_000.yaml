body:
  text: 天竺國菩提達摩禪師論整理者方廣錩題解天竺國菩提達摩禪師論又名達摩禪師論中國僧人假託禪宗初祖菩提達摩所撰典籍著者不詳一卷在敦煌遺書中至今已經發現兩種題名為達摩禪師論的文獻其一為日本橋本凝胤所藏首殘尾存尾題作達摩禪師論係唐高宗開耀元年所書後被收入關口真大達摩大師之研究一書中該文獻論述徐緩唯淨唯善等三種安樂法門主張禪師必須自守戒行另一種為日本田中良昭於法國敦煌特藏中發現的伯號該號首尾完整首題作天竺國菩提達摩禪師論尾題作達摩禪師論論述禪門之法先從禪定門順序至安心門共列舉了十五種禪門之法的名稱接著從安心門逆序至禪定門逐一解釋這些禪門之法的意義從內容看上述兩種達摩禪師論應是同名的不同文獻這兩種文獻均未為我國歷代經録所著録亦未為歷代大藏經所收最近我們發現北京圖書館所藏敦煌遺書北新號首殘尾脫與北新號首脫尾殘所抄均為禪文獻紙質字體完全相同本為同卷後因紙縫粘接處脫落遂成為兩件綴接後文字相連無間所抄寫的第一個文獻首殘尾全無尾題故不知名第二個文獻首尾完整首題作禪策問答無尾題第三個文獻首尾完整首題作息諍論無尾題最後還抄寫了一則禪問答及若干禪詩其後經田中良昭先生鑒定第一個闕名殘文獻即天竺國菩提達摩禪師論的又一個抄本新號與新號本為一卷依次所抄均為禪文獻故應屬傳入敦煌的宗密禪藏的組成部分對研究早期禪宗及宗密禪藏均有一定的價值與伯號相比北圖本缺失首尾題及首部約三百餘字但在對諸種法門一一解釋之後末尾多了一段總結性文字稱這些禪門之法均為往古大德禪師所作最後並有一段關於大小乘禪區別的問答共約多出六百餘字從文獻形態看這些多出的文字顯然是後人增補的因此可以肯定地説北圖本的産生比伯號的時代要晚從兩本共同的部分看內容略有差異文字互有優劣可資互校整理本綜合伯號及北新號録為全本其中首部北圖本缺失部分以伯號為底本無校本其後兩本共同部分以北新號為底本以伯號為甲本最後北圖本獨有部分以北圖本為底本無校本底校本的換用情況在校記中隨文説明古代佛典在傳抄中增衍嬗變甚為常見有的在流傳中形成異本應分別整理如本書整理發表的天公經佛母經等有的雖然有差異但不足以成為異本可資互校即使已經成為異本因其出於同源亦可以相互參校因此對同一主題內容的不同抄本應整理為一本還是分作異本有時成為佛典整理中的一個難點對天竺國菩提達摩禪師論本書擬先將北圖本與伯號合校為一本發表在第一輯然後將上述兩號分別整理發表在第二輯以此作為整理這一類佛典的一種嘗試敬請讀者批評北圖本曾於年月日在日本京都禪文化研究所集體討論此次整理吸收了討論會上的不少校訂意見特別吸收了西口芳男先生對本文獻的校訂意見與注釋特此説明並向田中良昭西口芳男及參加討論會的其他諸位先生表示感謝録文
